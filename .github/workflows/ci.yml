name: Ticket-VCS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Flake8
        run: pip install flake8
      - name: Run Flake8 Linter
        run: flake8 user-service/ ticket-service/ vcs-service/ --max-line-length=150 --ignore=E501,W503,E302,E305,E231,E225,E261,E262 || true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build User Service
        run: docker build -t user-service:test ./user-service
      - name: Build Ticket Service
        run: docker build -t ticket-service:test ./ticket-service
      - name: Build VCS Service
        run: docker build -t vcs-service:test ./vcs-service
      - name: Verify Docker Images
        run: docker images | grep -E "(user-service|ticket-service|vcs-service)"

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Start Services
        run: |
          docker-compose up -d --build
          sleep 20
      - name: Check Health Endpoints
        run: |
          curl -f http://localhost:8001/health || exit 1
          curl -f http://localhost:8002/health || exit 1
          curl -f http://localhost:8003/health || exit 1
          echo "All services healthy"
      - name: Test Full Integration Flow
        run: |
          USER=$(curl -s -X POST http://localhost:8001/users -H "Content-Type: application/json" -d '{"username":"ci_user","email":"ci@test.com","full_name":"CI User","role":"developer"}')
          echo "User: $USER"
          USER_ID=$(echo $USER | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          TICKET=$(curl -s -X POST http://localhost:8002/tickets -H "Content-Type: application/json" -d "{\"title\":\"CI Test\",\"description\":\"Integration test\",\"reporter_id\":\"$USER_ID\"}")
          echo "Ticket: $TICKET"
          TICKET_ID=$(echo $TICKET | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          FAIL=$(curl -s -w "%{http_code}" -X PUT "http://localhost:8002/tickets/$TICKET_ID" -H "Content-Type: application/json" -d '{"status":"DONE"}')
          echo "Expected 422 got: $FAIL"
          COMMIT=$(curl -s -X POST http://localhost:8003/commits -H "Content-Type: application/json" -d "{\"message\":\"CI test commit\",\"ticket_id\":\"$TICKET_ID\",\"author_id\":\"$USER_ID\"}")
          echo "Commit: $COMMIT"
          DONE=$(curl -s -X PUT "http://localhost:8002/tickets/$TICKET_ID" -H "Content-Type: application/json" -d '{"status":"DONE"}')
          echo "Done: $DONE"
          echo $DONE | grep -q '"status":"DONE"' && echo "Integration test PASSED" || (echo "FAILED" && exit 1)
      - name: Cleanup
        if: always()
        run: |
          docker-compose down -v
          docker system prune -f