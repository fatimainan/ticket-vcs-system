name: Ticket-VCS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 1. KOD KALİTE KONTROLÜ (Lint & Format)
  # ═══════════════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linting Tools
        run: |
          pip install flake8 black isort

      - name: Check Code Formatting (Black)
        run: |
          black --check --diff user-service/ ticket-service/ vcs-service/

      - name: Check Import Sorting (isort)
        run: |
          isort --check-only --diff user-service/ ticket-service/ vcs-service/

      - name: Run Flake8 Linter
        run: |
          flake8 user-service/ ticket-service/ vcs-service/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --show-source

  # ═══════════════════════════════════════════════════════════════
  # 2. BİRİM TESTLERİ (Unit Tests)
  # ═══════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [user-service, ticket-service, vcs-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          pytest -v --tb=short || echo "No tests yet for ${{ matrix.service }}"

  # ═══════════════════════════════════════════════════════════════
  # 3. DOCKER BUILD KONTROLÜ
  # ═══════════════════════════════════════════════════════════════
  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build User Service
        run: |
          docker build -t user-service:test ./user-service

      - name: Build Ticket Service
        run: |
          docker build -t ticket-service:test ./ticket-service

      - name: Build VCS Service
        run: |
          docker build -t vcs-service:test ./vcs-service

      - name: Verify Docker Images
        run: |
          docker images | grep -E "(user-service|ticket-service|vcs-service)"

  # ═══════════════════════════════════════════════════════════════
  # 4. ENTEGRASYON TESTLERİ (Docker Compose)
  # ═══════════════════════════════════════════════════════════════
  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Services with Docker Compose
        run: |
          docker-compose up -d --build
          sleep 15  # Servislerin başlaması için bekle

      - name: Check Service Health
        run: |
          # Healthcheck endpoint'lerini test et
          curl -f http://localhost:8001/health || exit 1
          curl -f http://localhost:8002/health || exit 1
          curl -f http://localhost:8003/health || exit 1
          echo "✅ All services are healthy!"

      - name: Run Integration Tests
        run: |
          # User oluştur
          USER_RESPONSE=$(curl -s -X POST http://localhost:8001/users \
            -H "Content-Type: application/json" \
            -d '{"username":"ci_test_user","email":"ci@test.com","full_name":"CI Test","role":"developer"}')
          echo "User created: $USER_RESPONSE"
          USER_ID=$(echo $USER_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          # Ticket oluştur
          TICKET_RESPONSE=$(curl -s -X POST http://localhost:8002/tickets \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"CI Test Ticket\",\"description\":\"Integration test\",\"reporter_id\":\"$USER_ID\"}")
          echo "Ticket created: $TICKET_RESPONSE"
          TICKET_ID=$(echo $TICKET_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          # Commit oluştur
          COMMIT_RESPONSE=$(curl -s -X POST http://localhost:8003/commits \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"CI test commit\",\"ticket_id\":\"$TICKET_ID\",\"author_id\":\"$USER_ID\"}")
          echo "Commit created: $COMMIT_RESPONSE"

          # Ticket'ı DONE yap
          DONE_RESPONSE=$(curl -s -X PUT "http://localhost:8002/tickets/$TICKET_ID" \
            -H "Content-Type: application/json" \
            -d '{"status":"DONE"}')
          echo "Ticket updated: $DONE_RESPONSE"

          # Kontrol et
          echo $DONE_RESPONSE | grep -q '"status":"DONE"' && echo "✅ Integration test PASSED!" || (echo "❌ Integration test FAILED!" && exit 1)

      - name: Cleanup
        if: always()
        run: |
          docker-compose down -v
          docker system prune -f

  # ═══════════════════════════════════════════════════════════════
  # 5. GÜVENLİK TARAMASI (Dependency Check)
  # ═══════════════════════════════════════════════════════════════
  security-scan:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Safety
        run: pip install safety

      - name: Check Dependencies for Vulnerabilities
        run: |
          for service in user-service ticket-service vcs-service; do
            echo "Checking $service..."
            safety check -r $service/requirements.txt --full-report || true
          done

  # ═══════════════════════════════════════════════════════════════
  # 6. DOCKER HUB PUSH (Sadece main branch'e merge edilince)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Images
        run: |
          # Versiyon tag'i olarak commit SHA kullan
          VERSION=${{ github.sha }}

          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:$VERSION ./user-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ticket-service:$VERSION ./ticket-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vcs-service:$VERSION ./vcs-service

          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:$VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/ticket-service:$VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/vcs-service:$VERSION

          # Latest tag'i de güncelle
          docker tag ${{ secrets.DOCKER_USERNAME }}/user-service:$VERSION ${{ secrets.DOCKER_USERNAME }}/user-service:latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/ticket-service:$VERSION ${{ secrets.DOCKER_USERNAME }}/ticket-service:latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/vcs-service:$VERSION ${{ secrets.DOCKER_USERNAME }}/vcs-service:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ticket-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/vcs-service:latest
